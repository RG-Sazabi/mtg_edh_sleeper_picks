{% extends "base.html" %}
{% block title %}Search — MTG EDH Sleeper Picks{% endblock %}
{% block content %}
<h1>MTG EDH Sleeper Picks</h1>
<p>Find underplayed cards for your Commander deck.</p>
<form method="POST" action="{{ url_for('index') }}">
  <div class="autocomplete">
    <input type="text" name="commander" id="commander-input"
           placeholder="e.g. Atraxa, Praetors' Voice"
           autocomplete="off" required autofocus
           role="combobox" aria-autocomplete="list"
           aria-controls="commander-suggestions" aria-expanded="false">
    <ul id="commander-suggestions" class="autocomplete-list" role="listbox" hidden></ul>
  </div>
  <div class="autocomplete" id="partner-wrap" hidden>
    <input type="text" name="partner" id="partner-input" placeholder="partner / background…"
           autocomplete="off" role="combobox" aria-autocomplete="list"
           aria-controls="partner-suggestions" aria-expanded="false">
    <ul id="partner-suggestions" class="autocomplete-list" role="listbox" hidden></ul>
  </div>
  <button type="submit">Analyze</button>
</form>
<p id="autocomplete-hint" class="autocomplete-hint" hidden>
  Press <kbd>Tab</kbd> to complete: <span id="autocomplete-top"></span>
</p>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/autocomplete.js') }}"></script>
{% endblock %}
